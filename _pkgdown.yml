title: spatialData

home:
  title: "spatialData: Cool Spatial Datasets"
url: https://blasbenito.github.io/spatialData/

llm-docs: false

template:
  bootstrap: 5
  fonts:
    heading: Montserrat
    body: Montserrat
  includes:
    in_header: |
      <link rel="stylesheet" href="extra.css"

authors:
  Blas M. Benito:
    href: https://blasbenito.com

articles:
- title: "Tutorials"
  navbar: "Tutorials"
  contents:
  - articles/vi
  - articles/plantae
  - articles/quercus
  - articles/neanderthal
  - articles/trees
  - articles/communities
  - articles/interaction
  - articles/linaria
  - articles/andalusia

reference:
  - title: "neanderthal"
    desc: "Neanderthal presence/absence records with paleoclimate and topographic predictors."
    contents:
      - neanderthal
      - neanderthal_response
      - neanderthal_predictors
      - neanderthal_extra

  - title: "plantae"
    desc: "Plant diversity metrics for global ecoregions with environmental predictors."
    contents:
      - plantae
      - plantae_responses
      - plantae_predictors
      - plantae_west
      - plantae_east
      - plantae_extra

  - title: "quercus"
    desc: "European oak species distribution records with bioclimatic and land cover predictors."
    contents:
      - quercus
      - quercus_response
      - quercus_predictors
      - quercus_extra

  - title: "vi"
    desc: "Global NDVI records with climate, soil, and topographic predictors."
    contents:
      - vi
      - vi_responses
      - vi_predictors
      - vi_extra

  - title: "trees"
    desc: "Richness of Mesoamerican trees across North and South America."
    contents:
      - trees
      - trees_response
      - trees_predictors
      - trees_extra

  - title: "communities"
    desc: "Plant community records from the Sierra Nevada (SE Spain) with climate and topographic predictors."
    contents:
      - communities
      - communities_responses
      - communities_predictors
      - communities_extra_2010
      - communities_extra_2050
      - communities_extra_2100

  - title: "interaction"
    desc: "Co-occurrence records for a butterfly-plant interaction in the Sierra Nevada (SE Spain) with environmental predictors."
    contents:
      - interaction
      - interaction_responses
      - interaction_predictors
      - interaction_extra

  - title: "linaria"
    desc: "Presence and background records for Linaria nigricans and greenhouses in Andalusia, Spain, with Landsat, climate, and topographic predictors."
    contents:
      - linaria
      - linaria_responses
      - linaria_predictors
      - linaria_extra

  - title: "andalusia"
    desc: "Presence and background records for several plant species in Andalusia, Spain, with Landsat, climate, and topographic predictors."
    contents:
      - andalusia
      - andalusia_responses
      - andalusia_predictors
      - andalusia_extra

